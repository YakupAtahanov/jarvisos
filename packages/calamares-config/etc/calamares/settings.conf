# Configuration file for Calamares
---
modules-search: [ local ]

instances:
  - id: mount-bootmnt
    module: shellprocess
    config: shellprocess_mount-bootmnt.conf
  - id: preint-install
    module: shellprocess
    config: shellprocess_preint-install.conf
  - id: mkinitcpio
    module: shellprocess
    config: shellprocess_mkinitcpio.conf
  - id: post-install
    module: shellprocess
    config: shellprocess_post-install.conf
  - id: ollama-model
    module: shellprocess
    config: shellprocess_ollama-model.conf
  - id: bootloader
    module: packagechooser
    config: packagechooser_bootloader.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - packagechooser@bootloader
      - netinstall
      - users
      - summary
  - exec:
      - partition
      - mount
      - shellprocess@mount-bootmnt
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - luksbootkeyfile
      - luksopenswaphookcfg
      - shellprocess@preint-install
      - shellprocess@mkinitcpio
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - packagechooser@bootloader
      - packages
      - shellprocess@ollama-model
      - shellprocess@post-install
      - bootloader
      - umount
  - show:
      - finished

branding: jarvisos

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: false
quit-at-end: false
