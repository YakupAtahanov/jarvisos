# SPDX-FileCopyrightText: no
# SPDX-License-Identifier: CC0-1.0
#
# Replacement for the stock initcpiocfg + initcpio modules.
#
# The stock Calamares C++ initcpio module has two problems for JARVIS OS:
#   1. initcpiocfg scans /boot/ for kernels and can fall back to "vmlinuz-linux"
#      even when kernel: linux-jarvisos is set in config — the scan logic is
#      hardcoded to prefer the default Arch kernel name.
#   2. The C++ targetEnvCall() chroot does not guarantee /dev is bind-mounted
#      by the time mkinitcpio runs — the mounts from the mount module can be
#      lost after unpackfs extracts the squashfs over the target root.
#
# This shellprocess replaces both modules by:
#   - Explicitly bind-mounting /dev, /proc, /sys, /run into the target
#   - Running mkinitcpio -p linux-jarvisos directly via chroot
#   - Cleaning up the mounts afterward
#
# Failures here are FATAL (no "-" prefix) — if mkinitcpio can't run,
# the installed system won't boot, so we must not silently continue.
---
dontChroot: true
timeout: 120

script:
  - command: "/bin/bash -c '
      set -e;
      ROOT=\"@@ROOT@@\";
      echo \"[mkinitcpio] Target root: ${ROOT}\";

      echo \"[mkinitcpio] Bind-mounting critical filesystems...\";

      mount --rbind /dev \"${ROOT}/dev\" 2>/dev/null || true;
      mount --make-rslave \"${ROOT}/dev\" 2>/dev/null || true;

      mountpoint -q \"${ROOT}/dev/pts\" || {
        mkdir -p \"${ROOT}/dev/pts\";
        mount -t devpts devpts \"${ROOT}/dev/pts\";
      };

      mountpoint -q \"${ROOT}/proc\" || {
        mkdir -p \"${ROOT}/proc\";
        mount -t proc proc \"${ROOT}/proc\";
      };

      mountpoint -q \"${ROOT}/sys\" || {
        mkdir -p \"${ROOT}/sys\";
        mount -t sysfs sysfs \"${ROOT}/sys\";
      };

      mountpoint -q \"${ROOT}/run\" || {
        mkdir -p \"${ROOT}/run\";
        mount --bind /run \"${ROOT}/run\";
      };

      if [ -d /sys/firmware/efi/efivars ]; then
        mountpoint -q \"${ROOT}/sys/firmware/efi/efivars\" || {
          mkdir -p \"${ROOT}/sys/firmware/efi/efivars\";
          mount -t efivarfs efivarfs \"${ROOT}/sys/firmware/efi/efivars\" 2>/dev/null || true;
        };
      fi;

      echo \"[mkinitcpio] Verifying /dev is mounted...\";
      ls \"${ROOT}/dev/null\" > /dev/null 2>&1 || {
        echo \"ERROR: /dev/null not accessible in target — mount failed\";
        exit 1;
      };

      echo \"[mkinitcpio] Verifying kernel exists...\";
      if [ ! -f \"${ROOT}/boot/vmlinuz-linux-jarvisos\" ]; then
        echo \"ERROR: /boot/vmlinuz-linux-jarvisos not found in target\";
        ls -la \"${ROOT}/boot/\" || true;
        exit 1;
      fi;

      echo \"[mkinitcpio] Verifying preset exists...\";
      if [ ! -f \"${ROOT}/etc/mkinitcpio.d/linux-jarvisos.preset\" ]; then
        echo \"ERROR: /etc/mkinitcpio.d/linux-jarvisos.preset not found\";
        ls -la \"${ROOT}/etc/mkinitcpio.d/\" || true;
        exit 1;
      fi;

      echo \"[mkinitcpio] Running: chroot ${ROOT} mkinitcpio -p linux-jarvisos\";
      chroot \"${ROOT}\" mkinitcpio -p linux-jarvisos;
      RETVAL=$?;

      echo \"[mkinitcpio] mkinitcpio exited with code ${RETVAL}\";

      echo \"[mkinitcpio] Cleaning up mounts...\";
      umount \"${ROOT}/sys/firmware/efi/efivars\" 2>/dev/null || true;
      umount \"${ROOT}/run\" 2>/dev/null || true;
      umount \"${ROOT}/sys\" 2>/dev/null || true;
      umount \"${ROOT}/proc\" 2>/dev/null || true;
      umount \"${ROOT}/dev/pts\" 2>/dev/null || true;
      umount -R \"${ROOT}/dev\" 2>/dev/null || true;

      exit ${RETVAL};
      '"
    timeout: 110
