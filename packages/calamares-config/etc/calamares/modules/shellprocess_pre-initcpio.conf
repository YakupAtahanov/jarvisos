#
# Ensure /dev, /proc, /sys are bind-mounted in the target before mkinitcpio.
#
# The Calamares mount module sets up these mounts early, but they can be
# lost or disrupted by the time initcpio runs (e.g. after unpackfs extracts
# the rootfs squashfs). This step re-establishes them to guarantee
# mkinitcpio has access to /dev, /proc, /sys, and /run.
---
dontChroot: true
timeout: 30

script:
  - command: "-/bin/bash -c '
      ROOT=\"@@ROOT@@\";
      echo \"Ensuring critical filesystems are mounted in ${ROOT}\";

      # /proc
      if ! mountpoint -q \"${ROOT}/proc\" 2>/dev/null; then
        mkdir -p \"${ROOT}/proc\";
        mount -t proc proc \"${ROOT}/proc\";
        echo \"Mounted /proc\";
      fi;

      # /sys
      if ! mountpoint -q \"${ROOT}/sys\" 2>/dev/null; then
        mkdir -p \"${ROOT}/sys\";
        mount -t sysfs sys \"${ROOT}/sys\";
        echo \"Mounted /sys\";
      fi;

      # /dev (rbind to include submounts like /dev/pts, /dev/shm)
      if ! mountpoint -q \"${ROOT}/dev\" 2>/dev/null; then
        mkdir -p \"${ROOT}/dev\";
        mount --rbind /dev \"${ROOT}/dev\";
        mount --make-rslave \"${ROOT}/dev\";
        echo \"Mounted /dev (rbind)\";
      fi;

      # /run
      if ! mountpoint -q \"${ROOT}/run\" 2>/dev/null; then
        mkdir -p \"${ROOT}/run\";
        mount -t tmpfs tmpfs \"${ROOT}/run\";
        echo \"Mounted /run\";
      fi;

      # /run/udev
      if ! mountpoint -q \"${ROOT}/run/udev\" 2>/dev/null; then
        mkdir -p \"${ROOT}/run/udev\";
        mount --bind /run/udev \"${ROOT}/run/udev\";
        echo \"Mounted /run/udev\";
      fi;

      # EFI vars (if available)
      if [ -d /sys/firmware/efi/efivars ]; then
        if ! mountpoint -q \"${ROOT}/sys/firmware/efi/efivars\" 2>/dev/null; then
          mkdir -p \"${ROOT}/sys/firmware/efi/efivars\";
          mount -t efivarfs efivarfs \"${ROOT}/sys/firmware/efi/efivars\" 2>/dev/null || true;
          echo \"Mounted efivarfs\";
        fi;
      fi;

      echo \"All critical filesystems verified\";
      '"
    timeout: 25
