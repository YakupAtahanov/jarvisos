---
showSupportUrl: false
showKnownIssuesUrl: false
showReleaseNotesUrl: false

requirements:
  # 30 GB: base install (~8 GB) + JARVIS venv + Ollama model (~3-8 GB) +
  # headroom for the user.  Matches requiredStorage in partition.conf.
  requiredStorage: 30.0
  requiredRam: 4.0
  internetCheckUrl: https://www.archlinux.org
  check:
    - storage
    - ram
    - power
    - internet
    - root
  required:
    - storage
    - ram
    - root



