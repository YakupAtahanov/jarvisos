---
showSupportUrl: false
showKnownIssuesUrl: false
showReleaseNotesUrl: false

requirements:
  # 20 GB covers base install (~8 GB) + JARVIS venv + Ollama model (~3-8 GB
  # depending on which model jarvis-setup.service pulls on first boot).
  requiredStorage: 20.0
  requiredRam: 4.0
  internetCheckUrl: https://www.archlinux.org
  check:
    - storage
    - ram
    - power
    - internet
    - root
  required:
    - storage
    - ram
    - root



