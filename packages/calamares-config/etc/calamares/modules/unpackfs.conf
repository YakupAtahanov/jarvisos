#
# Unpack filesystems from the live system to the target
#
# The squashfs (airootfs.sfs) contains the full rootfs including
# /boot/vmlinuz-linux-jarvisos and /boot/initramfs-linux-jarvisos.img
# as built by step 3b. The explicit file entries below copy the
# final versions from the ISO boot directory as an authoritative override.
---
unpack:
  # Main system files (rootfs — includes /boot/vmlinuz-linux-jarvisos + modules)
  - source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
    sourcefs: "squashfs"
    destination: ""

  # linux-jarvisos kernel (Calamares install target — JARVIS AI drivers)
  - source: "/run/archiso/bootmnt/arch/boot/x86_64/vmlinuz-linux-jarvisos"
    sourcefs: "file"
    destination: "/boot/vmlinuz-linux-jarvisos"

  # linux-jarvisos initramfs
  - source: "/run/archiso/bootmnt/arch/boot/x86_64/initramfs-linux-jarvisos.img"
    sourcefs: "file"
    destination: "/boot/initramfs-linux-jarvisos.img"

  # linux-jarvisos fallback initramfs
  - source: "/run/archiso/bootmnt/arch/boot/x86_64/initramfs-linux-jarvisos-fallback.img"
    sourcefs: "file"
    destination: "/boot/initramfs-linux-jarvisos-fallback.img"
