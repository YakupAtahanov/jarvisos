#
# Calamares services-systemd module configuration.
# Uses the "units:" key — the ONLY key this module recognises.
# Each entry: name (unit name), action (systemctl verb), mandatory (bool).
---
units:
  # --- Enable core services ---
  - name: "NetworkManager.service"
    action: "enable"
    mandatory: true

  - name: "systemd-resolved.service"
    action: "enable"
    mandatory: true

  - name: "sddm.service"
    action: "enable"
    mandatory: true

  - name: "wpa_supplicant.service"
    action: "enable"
    mandatory: true

  - name: "bluetooth.service"
    action: "enable"
    mandatory: false

  - name: "ollama.service"
    action: "enable"
    mandatory: false

  - name: "jarvis.service"
    action: "enable"
    mandatory: false

  - name: "jarvis-setup.service"
    action: "enable"
    mandatory: false

  # --- Disable / mask conflicting services ---
  - name: "iwd.service"
    action: "disable"
    mandatory: false

  - name: "iwd.service"
    action: "mask"
    mandatory: false

  - name: "NetworkManager-wait-online.service"
    action: "disable"
    mandatory: false

  # --- Set default target ---
  - name: "graphical.target"
    action: "enable"
    mandatory: true
