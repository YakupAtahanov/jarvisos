#
# Bootloader configuration for JARVIS OS.
#
# efiBootLoader is read from global storage key "packagechooser_bootloader"
# which is set by the packagechooser@bootloader UI step.  Valid values:
#   "grub"         — supports BIOS and UEFI; recommended for dual-boot
#   "systemd-boot" — lightweight UEFI-only loader
#
# Calamares automatically falls back to GRUB when the system is BIOS/Legacy
# even if the user selected systemd-boot (systemd-boot requires UEFI).
---

# Read the user's bootloader choice from global storage.
efiBootLoader: "packagechooser_bootloader"

# ── Kernel and initramfs (used by both bootloaders) ──────────────────────────
# ESP is mounted at /boot so paths here are relative to the ESP root.
kernel: /vmlinuz-linux-jarvisos

img: /initramfs-linux-jarvisos.img

fallback: /initramfs-linux-jarvisos-fallback.img

# ── Common settings ───────────────────────────────────────────────────────────
timeout: 5

kernelLine: ", with Linux linux-jarvisos"

fallbackKernelLine: ", with Linux linux-jarvisos (fallback initramfs)"

# ── GRUB-specific settings ────────────────────────────────────────────────────
grubInstall: "grub-install"

grubMkconfig: "grub-mkconfig"

grubCfg: "/boot/grub/grub.cfg"

grubProbe: "grub-probe"

efiBootMgr: "efibootmgr"

# Install EFI fallback boot entry (/EFI/BOOT/BOOTx64.EFI).
# Safe on UEFI systems; ignored on BIOS systems.
installEFIFallback: true

# ── systemd-boot loader entry ─────────────────────────────────────────────────
# When systemd-boot is selected, Calamares runs "bootctl --path=/boot install"
# and creates a loader entry using the kernel/img/fallback paths above.
# The loader entry file will be: /boot/loader/entries/JARVIS.conf
# These settings control the content of that entry.
#
# Note: Calamares writes the entry automatically — the settings below are
# used by newer Calamares versions that support sdbootLoader configuration.
# Older versions fall back to defaults.
sdbootLoader: "bootctl"
