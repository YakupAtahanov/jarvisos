# Partitioning configuration
---
# Mount ESP at /boot so both GRUB and systemd-boot work without extra config.
# GRUB:         grub-install --efi-directory=/boot --boot-directory=/boot
# systemd-boot: bootctl --path=/boot install
efiSystemPartition: "/boot"

# 1 GB gives headroom for the kernel (vmlinuz-linux-jarvisos ~16 MB),
# initramfs (~240 MB), fallback initramfs (~240 MB), and GRUB EFI stub.
efiSystemPartitionSize: 1024M

efiSystemPartitionName: EFI

userSwapChoices:
  - none
  - small
  - suspend
  - file

# Minimum disk size in GiB — Calamares will warn the user if the target
# disk is smaller than this. The uncompressed rootfs is ~20 GB so 30 GB
# gives a safe margin for the user's files and swap.
requiredStorage: 30

drawNestedPartitions: false

alwaysShowPartitionLabels: true

initialPartitioningChoice: none

initialSwapChoice: none

defaultFileSystemType: "ext4"

availableFileSystemTypes:
  - "ext4"
  - "btrfs"
  - "xfs"
  - "f2fs"



