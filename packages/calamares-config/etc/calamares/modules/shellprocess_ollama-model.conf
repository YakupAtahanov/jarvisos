#
# Pull the default JARVIS Ollama model into the installed system.
#
# Runs inside the target chroot after the packages step so the user sees
# it as part of the "Install packages" phase. Requires internet access.
#
# The actual logic lives in /usr/local/bin/calamares-pull-model.sh which is
# shipped by the calamares-config package and is therefore present in the
# target after unpackfs copies the squashfs.
#
# jarvis-setup.service remains enabled as a fallback — if this step fails
# (slow connection, no internet, timeout) the service retries on first login.
---
dontChroot: false
timeout: 1800

script:
  - command: "/usr/local/bin/calamares-pull-model.sh"
    timeout: 1800
