#
# Bootloader selection for JARVIS OS.
#
# The selected item's id is written to global storage as
# "packagechooser_bootloader", which bootloader.conf reads via
#   efiBootLoader: "packagechooser_bootloader"
#
# - GRUB:         supports BIOS (legacy) and UEFI systems; recommended for
#                 dual-boot setups or systems with older firmware.
# - systemd-boot: lightweight UEFI-only bootloader built into systemd;
#                 recommended for single-boot UEFI systems.
#
# Both bootloaders are already present in the squashfs (grub from the live
# environment; bootctl from systemd). No extra packages need to be installed.
---
mode: required
method: legacy

labels:
  step: "Bootloader"
  step[es]: "Gestor de arranque"
  step[fr]: "Chargeur d'amorçage"
  step[de]: "Bootloader"

items:
  - id: "grub"
    name: "GRUB"
    name[es]: "GRUB"
    name[fr]: "GRUB"
    name[de]: "GRUB"
    description: "Recommended for most systems. Supports BIOS and UEFI, dual-boot, and encrypted disks. Shows a graphical boot menu."
    description[es]: "Recomendado para la mayoría de sistemas. Compatible con BIOS y UEFI, arranque dual y discos cifrados."
    description[fr]: "Recommandé pour la plupart des systèmes. Prend en charge BIOS et UEFI, dual-boot et disques chiffrés."
    description[de]: "Für die meisten Systeme empfohlen. Unterstützt BIOS und UEFI, Dual-Boot und verschlüsselte Laufwerke."
    screenshot: ":/images/no-selection.png"
    packages: []

  - id: "systemd-boot"
    name: "systemd-boot"
    name[es]: "systemd-boot"
    name[fr]: "systemd-boot"
    name[de]: "systemd-boot"
    description: "Lightweight and fast. UEFI-only. Best for single-boot UEFI systems. Simple text-based boot menu."
    description[es]: "Ligero y rápido. Solo UEFI. Ideal para sistemas UEFI con un solo sistema operativo."
    description[fr]: "Léger et rapide. UEFI uniquement. Idéal pour les systèmes UEFI en mono-amorçage."
    description[de]: "Leichtgewichtig und schnell. Nur UEFI. Am besten für Single-Boot-UEFI-Systeme geeignet."
    screenshot: ":/images/no-selection.png"
    packages: []
