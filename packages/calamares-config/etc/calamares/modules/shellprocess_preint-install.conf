#
# Pre-initcpio installation: ensure linux-jarvisos is the sole kernel.
# Removes stock linux kernel preset and boot files from the target so that
# initcpiocfg + initcpio only operate on linux-jarvisos.
---
dontChroot: false
timeout: 30

script:
  - command: "rm -f /etc/mkinitcpio.d/linux.preset /boot/vmlinuz-linux /boot/initramfs-linux.img /boot/initramfs-linux-fallback.img; echo 'Removed stock linux kernel files — linux-jarvisos is the primary kernel'; exit 0"
    timeout: 10
