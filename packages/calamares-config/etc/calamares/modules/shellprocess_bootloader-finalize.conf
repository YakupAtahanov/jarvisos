#
# Post-bootloader shellprocess: finalize loader entries for both bootloaders.
#
# Runs outside the chroot (dontChroot: true) immediately after the bootloader
# module so ${ROOT} (rootMountPoint) and /boot are already set up.
#
# What this does:
#   GRUB  — updates /etc/default/grub to reference linux-jarvisos, then
#            re-runs grub-mkconfig inside the chroot to regenerate grub.cfg.
#   sd-boot — writes/overwrites the loader entry files so they always point
#              at vmlinuz-linux-jarvisos and include the correct UUID-based
#              root= kernel parameter. Calamares sometimes generates entries
#              for the default "linux" kernel even when bootloader.conf
#              specifies linux-jarvisos.
#
# ${ROOT} is substituted by Calamares from global storage (rootMountPoint).
---
dontChroot: true
timeout: 120

script:
  - command: "/bin/bash -c '
      set -e;
      ROOT=\"${ROOT}\";

      echo \"[bootloader-finalize] Target: ${ROOT}\";

      # ── Detect which bootloader was installed ─────────────────────────────
      if [ -f \"${ROOT}/boot/loader/loader.conf\" ]; then
          BOOTLOADER=\"systemd-boot\";
      elif [ -f \"${ROOT}/boot/grub/grub.cfg\" ]; then
          BOOTLOADER=\"grub\";
      else
          echo \"[bootloader-finalize] No recognisable bootloader found — skipping\";
          exit 0;
      fi;

      echo \"[bootloader-finalize] Detected bootloader: ${BOOTLOADER}\";

      # ── Get root UUID ─────────────────────────────────────────────────────
      ROOT_DEV=$(findmnt -n -o SOURCE \"${ROOT}\" 2>/dev/null | head -1);
      ROOT_UUID=$(blkid -s UUID -o value \"${ROOT_DEV}\" 2>/dev/null || true);

      if [ -z \"${ROOT_UUID}\" ]; then
          ROOT_UUID=$(grep -E \"^UUID=.*[ \\t]+/[ \\t]\" \"${ROOT}/etc/fstab\" 2>/dev/null | \
                      awk \"{print \$1}\" | sed \"s/UUID=//\" | head -1);
      fi;

      echo \"[bootloader-finalize] Root UUID: ${ROOT_UUID}\";

      # ── Detect filesystem type for btrfs subvol option ────────────────────
      ROOT_FS=$(findmnt -n -o FSTYPE \"${ROOT}\" 2>/dev/null || true);
      EXTRA_OPTS=\"\";
      [ \"${ROOT_FS}\" = \"btrfs\" ] && EXTRA_OPTS=\"rootflags=subvol=@\";

      # ── systemd-boot: write/fix loader entry ──────────────────────────────
      if [ \"${BOOTLOADER}\" = \"systemd-boot\" ]; then
          ENTRIES_DIR=\"${ROOT}/boot/loader/entries\";
          mkdir -p \"${ENTRIES_DIR}\";

          # Write loader.conf
          cat > \"${ROOT}/boot/loader/loader.conf\" <<LCONF
default jarvisos.conf
timeout 5
console-mode max
editor no
LCONF

          # Determine microcode initrd lines (include only those present)
          UCODE=\"\";
          [ -f \"${ROOT}/boot/intel-ucode.img\" ] && UCODE=\"${UCODE}initrd  /intel-ucode.img\n\";
          [ -f \"${ROOT}/boot/amd-ucode.img\"   ] && UCODE=\"${UCODE}initrd  /amd-ucode.img\n\";

          # Main entry
          printf \"title   JARVIS OS\nlinux   /vmlinuz-linux-jarvisos\n%sinitrd  /initramfs-linux-jarvisos.img\noptions root=UUID=${ROOT_UUID} rw quiet splash ${EXTRA_OPTS}\n\" \
              \"${UCODE}\" > \"${ENTRIES_DIR}/jarvisos.conf\";

          # Fallback entry
          printf \"title   JARVIS OS (fallback initramfs)\nlinux   /vmlinuz-linux-jarvisos\n%sinitrd  /initramfs-linux-jarvisos-fallback.img\noptions root=UUID=${ROOT_UUID} rw ${EXTRA_OPTS}\n\" \
              \"${UCODE}\" > \"${ENTRIES_DIR}/jarvisos-fallback.conf\";

          echo \"[bootloader-finalize] systemd-boot loader entries written\";
          cat \"${ENTRIES_DIR}/jarvisos.conf\";

      # ── GRUB: ensure grub.cfg references linux-jarvisos ──────────────────
      elif [ \"${BOOTLOADER}\" = \"grub\" ]; then
          # Update GRUB defaults if the file exists
          GRUB_DEF=\"${ROOT}/etc/default/grub\";
          if [ -f \"${GRUB_DEF}\" ]; then
              # Ensure GRUB_DEFAULT is set and timeout is reasonable
              grep -q \"^GRUB_TIMEOUT=\" \"${GRUB_DEF}\" || \
                  echo \"GRUB_TIMEOUT=5\" >> \"${GRUB_DEF}\";
              sed -i \
                  -e \"s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|\" \
                  -e \"s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|\" \
                  \"${GRUB_DEF}\";
          fi;

          # Re-run grub-mkconfig inside the chroot to pick up linux-jarvisos
          mount --rbind /dev  \"${ROOT}/dev\"  2>/dev/null || true;
          mount -t proc  proc \"${ROOT}/proc\" 2>/dev/null || true;
          mount -t sysfs sys  \"${ROOT}/sys\"  2>/dev/null || true;
          chroot \"${ROOT}\" grub-mkconfig -o /boot/grub/grub.cfg;
          umount \"${ROOT}/sys\"  2>/dev/null || true;
          umount \"${ROOT}/proc\" 2>/dev/null || true;
          umount -R \"${ROOT}/dev\" 2>/dev/null || true;

          echo \"[bootloader-finalize] GRUB config regenerated\";
      fi;

      echo \"[bootloader-finalize] Done\";
    '"
    timeout: 115
